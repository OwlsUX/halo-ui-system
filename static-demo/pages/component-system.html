<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Component System | Halo</title>
  <meta name="description" content="Halo component system placeholder.">
  <link rel="stylesheet" href="../css/halo-theme.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: var(--halo-color-surface-page, #f5f7f9);
      color: var(--halo-color-text-primary, #071826);
      font-family: var(--halo-font-live, Inter, system-ui, sans-serif);
    }

    .coming-soon {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 20px;
    }

    .coming-soon__panel {
      width: min(720px, 100%);
      padding: clamp(32px, 6vw, 72px);
      border: 1px solid var(--halo-color-border-subtle, #d8e0e7);
      border-radius: var(--halo-component-card-radius, 16px);
      background: var(--halo-color-surface-raised, #fff);
      box-shadow: var(--halo-shadow-soft, 0 18px 48px rgba(7, 24, 38, .08));
      text-align: center;
    }

    .coming-soon__eyebrow {
      margin: 0 0 12px;
      color: var(--halo-color-link, #1d73d4);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .coming-soon h1 {
      margin: 0;
      font-size: clamp(40px, 6vw, 72px);
      line-height: .98;
      letter-spacing: 0;
    }

    .coming-soon p {
      max-width: 520px;
      margin: 20px auto 0;
      color: var(--halo-color-text-secondary, #4f6578);
      font-size: 18px;
      line-height: 1.55;
    }

    .coming-soon__actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <main class="coming-soon">
    <section class="coming-soon__panel" aria-labelledby="component-system-title">
      <p class="coming-soon__eyebrow">Component System</p>
      <h1 id="component-system-title">Coming soon</h1>
      <p>The reusable Halo component library will live here once the source-backed page patterns are normalized.</p>
      <div class="coming-soon__actions">
        <a class="button button--yellow" href="style-guide.html">Open Style Guide</a>
        <a class="button button--secondary" href="../index.html">Back to Overview</a>
      </div>
    </section>
  </main>
  <script src="../js/components.js"></script>
</body>
</html>
